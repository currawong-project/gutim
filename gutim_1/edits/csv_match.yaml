# Legacy CSV → data model Note ID overrides.
#
# When a CSV non row cannot be matched automatically, add an entry here.
# Key:   "{measure}/{index}" — the measure number and per-measure index from the CSV
#        (both values appear in the merge-csv warning for that row)
# Value: the data model Note ID to match it to
#
# Example:
#   "12/3": n12_1F4q
#
# A key that maps to a non-existent Note ID is an error.


