# Format — patch an existing slur:
#   <slur_id>:
#     end_note_id:   <note_id>   # required when slur has no end marker in XML
#     start_note_id: <note_id>   # optional; only when start note ID is missing
#
# Format — create a new slur (XML had a stop marker but no matching start):
#   <slur_id>:
#     create:        true
#     start_note_id: <note_id>   # required
#     end_note_id:   <note_id>   # required
#
# Format — delete a slur (zero-length or otherwise invalid XML artefact):
#   <slur_id>:
#     delete:        true
#
# start_measure, end_measure, and voice are derived automatically from the notes.
      
# zero-length slurs (start and end resolve to the same note — XML artefacts)
